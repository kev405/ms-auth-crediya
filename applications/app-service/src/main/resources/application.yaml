server:
  port: 8080
spring:
  application:
    name: "Authentication"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/ms-auth-crediya
    user: ${adapters.r2dbc.username}
    password: ${adapters.r2dbc.password}
    locations: classpath:db/migration
    default-schema: public
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapters:
  r2dbc:
    host: "localhost"
    port: 5432
    database: "ms-auth-crediya"
    schema: "public"
    username: "postgres"
    password: "mysecretpassword"

routes:
  paths:
    users: /api/users
    usersById: /api/users/{id}
    usersByEmail: /api/users/email/{email}
    login: /api/login

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
security:
  jwt:
    secret: 23A522D4A614E645267556B58703273357638792F423F4528482B4D6251655468