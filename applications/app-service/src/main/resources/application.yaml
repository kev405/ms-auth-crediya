server:
  port: 8080
spring:
  application:
    name: "Authentication"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    default: dev
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

routes:
  paths:
    users: /auth/api/users
    usersById: /auth/api/users/{id}
    usersByEmail: /auth/api/users/email/{email}
    usersDataByEmail: /auth/api/users/email-info/{email}
    login: /auth/api/login

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha